name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Restore
        run: dotnet restore src/Notes.Web/Notes.Web.csproj

      - name: Build
        run: dotnet build src/Notes.Web/Notes.Web.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/Notes.Web/Notes.Web.csproj -c Release -o publish/web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/web/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
