name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0'

      - name: Publish Blazor WASM
        run: |
          dotnet restore src/Notes.Web/Notes.Web.csproj
          dotnet publish src/Notes.Web/Notes.Web.csproj -c Release -o publish/web

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish/web/wwwroot
          publish_branch: gh-pages
          force_orphan: true
