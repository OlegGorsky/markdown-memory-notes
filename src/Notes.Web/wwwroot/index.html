<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Заметки с памятью</title>
    <base href="/markdown-memory-notes/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <style>#blazor-error-ui{display:none}</style>
    <style>#app{background:#1E1C19;min-height:100vh}</style>
    <script>
        // Theme: dark by default, toggle with localStorage
        (function(){
            const html = document.documentElement;
            const saved = localStorage.getItem('mmn-theme');
            if (saved === 'light') html.classList.add('light');
            else if (saved === 'dark') html.classList.add('dark');
            else html.classList.add('dark'); // default dark
            window.toggleTheme = function(){
                if (html.classList.contains('dark')) {
                    html.classList.remove('dark'); html.classList.add('light');
                    localStorage.setItem('mmn-theme','light');
                } else {
                    html.classList.remove('light'); html.classList.add('dark');
                    localStorage.setItem('mmn-theme','dark');
                }
            };
        })();
    </script>
    <script type="importmap"></script>
</head>

<body>
    <div id="app" style="background:#1E1C19;min-height:100vh">
        <svg class="loading-progress" style="display:none">
            <circle r="40%" cx="50%" cy="50%" fill="none" />
            <circle r="40%" cx="50%" cy="50%" fill="none" />
        </svg>
        <div class="loading-progress-text" style="display:none"></div>
    </div>

    <div id="blazor-error-ui">
        Произошла ошибка.
        <a href="." class="reload">Перезагрузить</a>
        <span class="dismiss">✕</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Unregister old service workers to prevent stale cache
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    </script>
</body>

</html>
